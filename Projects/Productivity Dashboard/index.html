<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity DashBoard</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
        <section class="allElems">
            <div class="todo elem" id="0">
                <img src="https://plus.unsplash.com/premium_photo-1705010671530-bb31e965d124?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NTd8fGRhaWx5JTIwZ29hbHN8ZW58MHx8MHx8fDA%3D" alt="Image not found">
                <!-- <h2>To Do List</h2> -->
                <div class="backing"><h2>To Do List</h2></div>
            </div>
            <div class="daily elem" id="1">
                <img src="https://images.unsplash.com/photo-1676042367203-a1d5294655d2?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTF8fGRhaWx5JTIwcGxhbm5lcnxlbnwwfHwwfHx8MA%3D%3D" alt="Image not found">
                <!-- <h2>Daily Planner</h2> -->
                <div class="backing"><h2>Daily Planner</h2></div>
            </div>
            <div class="moti elem" id="2">
                <img src="https://images.unsplash.com/photo-1774202906831-771ceaee23c4?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDZ8Ym84alFLVGFFMFl8fGVufDB8fHx8fA%3D%3D" alt="Image not found">
                <!-- <h2>Motivation</h2> -->
                <div class="backing"><h2>Motivation</h2></div>
            </div>
            <div class="pomo elem" id="3">
                <img src="https://images.unsplash.com/photo-1734024653249-c6ba7b742ad2?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTh8fHBvbW9kb3JvJTIwdGltZXJ8ZW58MHx8MHx8fDA%3D" alt="Image not found">
                <!-- <h2>Pomodoro Timer</h2> -->
                <div class="backing"><h2>Pomodoro Timer</h2></div>
            </div>
            <div class="goals elem" id="4">
                <img src="https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8ODZ8fHZpc2lvbiUyMGJvYXJkfGVufDB8fDB8fHww" alt="Image not found">
                <!-- <h2>Daily Goals</h2> -->
                <div class="backing"><h2>Daily Goals</h2></div>
            </div>
        </section>

        <section class="fullElements">
            <button class="back" id="0">Close</button>
            <h1>To Do Page</h1>
        </section>
        <section class="fullElements">
            <button class="back" id="1">Close</button>
            <h1>Daily Planner</h1>
        </section>
        <section class="fullElements">
            <button class="back" id="2">Close</button>
            <h1>Motivation</h1>
        </section>
        <section class="fullElements">
            <button class="back" id="3">Close</button>
            <h1>Pomodora Timer</h1>
        </section>
        <section class="fullElements">
            <button class="back" id="4">Close</button>
            <h1>Daily Goals</h1>
        </section>

    </div>
    <script src="script.js"></script>
</body>
</html>
